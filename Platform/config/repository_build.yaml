# PrimeNet repository production execution plan
# Canonical paths and physical extent are read from primenet_config.yaml.

range:
  start: 2000000000001
  end: 3000000000000

big_batch:
  size: 100000000000

output_batch:
  size: 10000000000

build:
  overwrite: true
  skip_existing: false

logging:
  runtime_file: repository_driver_runtime.csv
  status_file: production_status.json

failure:
  stop_on_failure: true
